services:
  postgres:
    image: postgres:18.4-alpine
    container_name: emerald_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - emerald_db_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:alpine
    container_name: emerald_redis
    restart: always
    volumes:
      - emerald_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  emerald_db_data:
  emerald_redis_data:
